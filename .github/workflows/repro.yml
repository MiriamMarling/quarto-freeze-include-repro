name: repro
on:
  push:
  workflow_dispatch:

jobs:
  freeze-include-repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.37

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install knitr engine packages
        run: Rscript -e 'install.packages(c("knitr", "rmarkdown"))'

      # Control: a default project re-renders on the include change. Expected PASS.
      - name: Control (type default) — should re-render on include change
        run: bash repro-default.sh

      # Bug: the manuscript article goes stale. Expected FAIL while the bug exists,
      # which is the point — a red badge means the bug is still present, and this
      # job turns green the day Quarto fixes it.
      - name: Bug (type manuscript) — stale freeze on include change
        run: bash repro-manuscript.sh
